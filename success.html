<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="Page internet quoi :c">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <title>Site de Saint-Valentin</title>
    <link href="icone.ico" rel="icon"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #111;
            overflow: hidden;
        }

        span {
            position: absolute;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
            animation: fadeInOut 1s linear infinite;
        }

        @keyframes fadeInOut {
            0%, 100% {
                opacity: 0;
            }
            20%, 80% {
                opacity: 1;
            }
        }

        span::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url(heart.png);
            background-size: cover;
            animation: moveShape 1s linear infinite;
        }

        @keyframes moveShape {
            0% {
                transform: translate(0) rotate(0deg);
            }
            100% {
                transform: translate(300px) rotate(360deg);
            }
        }
    </style>
</head>

<body class="container-fluid bg-secondary">

<h1 class="text-center"> Site de vérification de la Saint-Valentin</h1>
<div class="row d-flex justify-content-center">
    <h1> Woooohooohohohohooooooooooooo</h1>
    <img alt="Gif d'amour" class="rounded" id="img" src="#" style="height:100%; width:auto">

</div>
<h1 class="text-center">💗💗💗💗💗💗 Je t'aimmmmeeueueueueuuuuuuh 💗💗💗💗💗💗</h1>
<script>
    document.addEventListener('mousemove', function (e) {
        let body = document.querySelector('body');
        let Heart = document.createElement('span');
        let x = e.offsetX;
        let y = e.offsetY;
        Heart.style.left = x + 'px';
        Heart.style.top = y + 'px';

        let size = Math.random() * 80;
        Heart.style.width = 20 + size + 'px';
        Heart.style.height = 20 + size + 'px';

        let transformValue = Math.random() * 360;
        Heart.style.transform = 'rotate(' + transformValue + ' deg)';

        body.append(Heart);

        setTimeout(function () {
            Heart.remove();
        }, 1000);
    })

    // Fonction pour récupérer un GIF aléatoire d'amour
    function fetchRandomLoveGif() {
        const apiKey = 'EOEM57ZgKZOuEoydQ8tAGURoZDyomtMt';
        const url = `https://api.giphy.com/v1/gifs/random?api_key=${apiKey}&tag=loveu&rating=g`;
        fetch(url).then(
            response => response.json()
        ).then(
            data => {
                const imgUrl = data.data.images.original.url;
                document.getElementById('img').src = imgUrl;
            }
        )
    }

    fetchRandomLoveGif()
</script>
