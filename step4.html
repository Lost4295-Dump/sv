<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="Page internet quoi :c">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <title>Site de Saint-Valentin</title>
    <link href="heart.png" rel="icon"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        #runaway-btn {
            position: absolute;
            top: 75%;
            left: 70%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body class="container-fluid bg-secondary">
<div class="row vh-100">
    <div class="col d-flex justify-content-center pt-5">
        <h1 class="text-center position-absolute top-0"> Site de vérification de la Saint-Valentin</h1>
        <div class="row">
            <div class="col d-flex justify-content-center align-items-center">
                <div class="card">
                <div class="card-body p-5">
                    <h2 class="fs-1">Veux-tu être ma valentine ?</h2>
                </div>
                <div class="card-footer d-flex justify-content-around p-5">
                    <a class="btn btn-success btn-lg" href="success.html">Oui !</a>
                    <a class="btn btn-danger btn-lg" id="runaway-btn" href="failure.html">Non...</a>
                    <a class="btn btn-lg" href="#">&nbsp;&nbsp;&nbsp;</a>
                </div>
            </div>
        </div>
        </div>
    </div>
</div>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.0/anime.min.js"></script>
<script>
    const button = document.getElementById("runaway-btn");

    const animateMove = (element, prop, pixels) =>
        anime({
            targets: element,
            [prop]: `${pixels}px`,
            easing: "easeOutCirc"
        });

    ["mouseover", "click"].forEach(function (el) {
        button.addEventListener(el, function (event) {
            const top = getRandomNumber(window.innerHeight - this.offsetHeight);
            const left = getRandomNumber(window.innerWidth - this.offsetWidth);
            setTimeout(()=> {

                animateMove(this, "left", left).play();
                animateMove(this, "top", top).play();
            }, 100);
        });
    });

    const getRandomNumber = (num) => {
        return Math.floor(Math.random() * (num + 1));
    };

</script>
</body>
</html>
